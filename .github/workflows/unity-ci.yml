name: Unity CI

on:
  push:
    branches: [main, 'fix/**', 'feature/**', 'claude/**']
  pull_request:
    branches: [main]

jobs:
  validate-structure:
    name: Validate Project Structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Unity project version
        run: |
          VERSION_FILE="OperaçãoZ-Prototipo3DV1/ProjectSettings/ProjectVersion.txt"
          if [ ! -f "$VERSION_FILE" ]; then
            echo "ERROR: ProjectVersion.txt not found" && exit 1
          fi
          echo "Unity version: $(cat "$VERSION_FILE")"

      - name: Check critical C# scripts exist
        run: |
          SCRIPTS=(
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Core/CommandSystem.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Core/GameManager.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Core/SelectionManager.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Core/RTSCameraController.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Units/UnitBase.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Units/CombatUnit.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Units/WorkerUnit.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Building/ProductionQueue.cs"
            "OperaçãoZ-Prototipo3DV1/Assets/Scripts/Economy/EconomyManager.cs"
          )
          FAIL=0
          for f in "${SCRIPTS[@]}"; do
            if [ -f "$f" ]; then
              echo "OK  $f"
            else
              echo "MISSING  $f"
              FAIL=1
            fi
          done
          exit $FAIL

      - name: Check no S-key conflict in RTSCameraController
        run: |
          FILE="OperaçãoZ-Prototipo3DV1/Assets/Scripts/Core/RTSCameraController.cs"
          if grep -q 'sKey\.isPressed' "$FILE"; then
            echo "FAIL: sKey conflict found in $FILE"
            exit 1
          fi
          echo "OK: no sKey conflict"

      - name: Verify assembly definition or namespace consistency
        run: |
          MISSING_NS=0
          for f in $(find "OperaçãoZ-Prototipo3DV1/Assets/Scripts" -name "*.cs" -not -path "*/Proto/*" -not -path "*/TutorialInfo/*"); do
            if ! grep -q "^namespace OPZ\." "$f"; then
              echo "WARN: no OPZ namespace in $f"
            fi
          done
          echo "Namespace check complete (warnings only)"
